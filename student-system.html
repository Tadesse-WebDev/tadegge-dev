<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade System v18.8</title>
    <style>
        /* የሲስተሙ ዋና ቀለሞች */
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --bg: #f8f9fa; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; color: #333; }
        
        /* ዋናው መያዣ ሳጥን */
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* መረጃ መሙያ ፎርም ዲዛይን */
        .setup { background: #eef4ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; flex-wrap: wrap; gap: 8px; }
        input, select { padding: 12px; border: 1px solid #c2d7ff; border-radius: 6px; font-size: 14px; flex: 1; min-width: 120px; }
        
        /* የቁልፎች (Buttons) ዲዛይን */
        .button-row { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; text-align: center; }
        .btn-add { background: var(--primary); }
        .btn-excel { background: var(--success); }
        .btn-undo { background: #f39c12; }

        /* ሰንጠረዡ በስልክ በጎን እንዲሳብ የሚያደርግ መያዣ */
        .table-container { width: 100%; overflow-x: auto; border-radius: 12px; background: white; }
        
        /* የሰንጠረዥ ሴሎች እንደ ቃላቱ ርዝመት እንዲለጠጡ (Auto Cell Width) */
        table { width: 100%; border-collapse: collapse; table-layout: auto; margin-top: 5px; }
        th, td { 
            border: 1px solid #dee2e6; 
            padding: 10px 8px; 
            text-align: center; 
            white-space: nowrap; /* ቃላቱ በአንድ መስመር እንዲሆኑና ሴሉን እንዲያስፉ */
            font-size: 13px; 
        }
        th { background: var(--primary); color: white; text-transform: uppercase; }
        
        /* ስም፣ ፆታ እና ክፍል የሚገቡባቸው ሴሎች አቀማመጥ */
        .name-cell, .meta-cell { text-align: left; font-weight: 600; background: #f8fafc; }
        .name-cell { white-space: normal; min-width: 150px; } /* ስም ረጅም ከሆነ ወደ ታች እንዲወርድ */

        /* የዓመታዊ ማጠቃለያ ከለር */
        .grand-summary { background: #fff9db; font-weight: bold; }
        
        /* ውጤት መሙያ ሳጥን */
        input.score { width: 45px; border: 1px solid #ccc; text-align: center; padding: 4px; border-radius: 4px; font-weight: bold; }
        
        /* ትናንሽ ቁልፎች */
        .row-btn { padding: 5px 8px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 11px; margin: 2px; }
        .del-btn { background: var(--danger); }
        .view-btn { background: #17a2b8; }

        /* ሪፖርት ካርድ ማሳያ */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Management System</h2>
    
    <div class="setup no-print">
        <div class="input-row">
            <input type="text" id="stdName" placeholder="Full Name">
            <select id="stdSex">
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>
            <input type="text" id="stdClass" placeholder="Class (e.g. 8A)">
        </div>
        <div class="input-row">
            <input type="text" id="subjects" placeholder="Subjects (e.g. Math, English, IT)">
            <select id="semCount">
                <option value="2">2 Semesters</option>
                <option value="4">4 Semesters</option>
            </select>
        </div>
        <div class="button-row">
            <button class="btn btn-add" onclick="register()">Add Student</button>
            <button class="btn btn-excel" onclick="exportToExcel()">Export Excel</button>
            <button class="btn btn-undo" id="undoBtn" onclick="undo()" disabled>Undo</button>
        </div>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; color:red; font-weight:bold;" onclick="closeModal()">CLOSE</span>
        <div id="report-area"></div>
        <button class="btn btn-add no-print" style="width:100%; margin-top:20px;" onclick="window.print()">Print Report</button>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('SchoolSystem_v18_8')) || [];
    let history = [];

    // ለ Undo ተግባር መረጃን ሴቭ ማድረጊያ
    function saveState() {
        if (history.length > 15) history.shift();
        history.push(JSON.stringify(students));
        document.getElementById('undoBtn').disabled = false;
    }

    // ወደ ኋላ መመለሻ
    function undo() {
        if (history.length > 0) {
            students = JSON.parse(history.pop());
            if (history.length === 0) document.getElementById('undoBtn').disabled = true;
            localStorage.setItem('SchoolSystem_v18_8', JSON.stringify(students));
            render();
        }
    }

    // ተማሪ መመዝገቢያ (ፆታ እና ክፍልን ጨምሮ)
    function register() {
        let name = document.getElementById('stdName').value.trim();
        let sex = document.getElementById('stdSex').value;
        let sClass = document.getElementById('stdClass').value.trim();
        let sCount = parseInt(document.getElementById('semCount').value);
        let subs = document.getElementById('subjects').value.split(',').map(s => s.trim()).filter(s => s !== "");
        
        if(!name || !sClass || subs.length === 0) { alert("Please fill all fields!"); return; }

        saveState();
        let semesterData = [];
        for(let i=0; i<sCount; i++) semesterData.push({ semName: "Sem " + (i+1), grades: subs.map(s => ({ val: 0 })) });
        
        students.push({ id: Date.now(), name, sex, sClass, sCount, subs, semesterData });
        saveAndRender();
        document.getElementById('stdName').value = "";
        document.getElementById('stdClass').value = "";
    }

    // ውጤት መቀየሪያ
    function updateScore(stdId, sIdx, gIdx, newVal) {
        saveState();
        let std = students.find(s => s.id === stdId);
        let val = parseFloat(newVal) || 0;
        std.semesterData[sIdx].grades[gIdx].val = Math.min(100, Math.max(0, val));
        saveAndRender();
    }

    // ዳታውን ሴቭ ማድረግና ድምር ማስላት
    function saveAndRender() {
        students.forEach(st => {
            let totalAll = 0;
            st.semesterData.forEach(sem => {
                sem.total = sem.grades.reduce((a, b) => a + b.val, 0);
                sem.avg = sem.total / st.subs.length;
                totalAll += sem.total;
            });
            st.grandTotal = totalAll;
            st.grandAvg = totalAll / (st.sCount * st.subs.length);
        });
        localStorage.setItem('SchoolSystem_v18_8', JSON.stringify(students));
        render();
    }

    // ደረጃ ማውጫ
    function getRank(studentId, type, semIdx = null) {
        let sorted = [...students].sort((a, b) => (type === 'annual' ? b.grandAvg - a.grandAvg : b.semesterData[semIdx].avg - a.semesterData[semIdx].avg));
        return sorted.findIndex(s => s.id === studentId) + 1;
    }

    // ሰንጠረዡን የማሳያ ፋንክሽን
    function render() {
        let body = document.getElementById('tableBody');
        let head = document.getElementById('headerRow');
        if (students.length === 0) { body.innerHTML = "<tr><td colspan='30'>No Data</td></tr>"; return; }

        let first = students[0];
        // የሰንጠረዥ ርዕሶች (Headers)
        let h = `<th>No</th><th>Name</th><th>Sex</th><th>Class</th><th>Term</th>`;
        first.subs.forEach(s => h += `<th>${s}</th>`);
        h += `<th>Total</th><th>Avg%</th><th>Rank</th><th class="no-print">Actions</th>`;
        head.innerHTML = h;

        body.innerHTML = "";
        students.forEach((st, idx) => {
            let rs = st.sCount + 1; // መርጅ የሚደረገው የረድፍ ብዛት

            st.semesterData.forEach((sem, sIdx) => {
                let row = `<tr>`;
                if(sIdx === 0) {
                    // ቁጥር፣ ስም፣ ፆታ እና ክፍል መርጅ (Merge) ሆነው ይገባሉ
                    row += `<td class="meta-cell" rowspan="${rs}">${idx + 1}</td>`;
                    row += `<td class="name-cell" rowspan="${rs}">${st.name}</td>`;
                    row += `<td class="meta-cell" rowspan="${rs}">${st.sex}</td>`;
                    row += `<td class="meta-cell" rowspan="${rs}">${st.sClass}</td>`;
                }
                
                row += `<td>${sem.semName}</td>`;
                sem.grades.forEach((g, gIdx) => {
                    row += `<td><input class="score" type="number" value="${g.val}" onchange="updateScore(${st.id}, ${sIdx}, ${gIdx}, this.value)"></td>`;
                });
                
                row += `<td style="background:#f0f7ff">${sem.total}</td>`;
                row += `<td>${sem.avg.toFixed(1)}</td>`;
                row += `<td style="color:var(--primary); font-weight:bold;">${getRank(st.id, 'term', sIdx)}</td>`;
                
                if(sIdx === 0) {
                    row += `<td rowspan="${rs}" class="no-print">
                        <button class="row-btn view-btn" onclick="viewCard(${st.id})">Report</button>
                        <button class="row-btn del-btn" onclick="del(${st.id})">Del</button>
                    </td>`;
                }
                body.innerHTML += row + `</tr>`;
            });
            
            // የዓመታዊ ማጠቃለያ መስመር
            let gr = `<tr class="grand-summary"><td>YEARLY</td>`;
            st.subs.forEach((_, subIdx) => {
                let sum = 0; for(let i=0; i<st.sCount; i++) sum += st.semesterData[i].grades[subIdx].val;
                gr += `<td>${(sum/st.sCount).toFixed(1)}</td>`;
            });
            gr += `<td>${st.grandTotal}</td><td>${st.grandAvg.toFixed(1)}%</td><td style="color:red;">${getRank(st.id, 'annual')}</td><td class="no-print"></td></tr>`;
            body.innerHTML += gr;
        });
    }

    // ሪፖርት ካርድ ማሳያ
    function viewCard(id) {
        let st = students.find(s => s.id === id);
        let html = `<div style="text-align:center;"><h3>Report Card: ${st.name}</h3><p>Sex: ${st.sex} | Class: ${st.sClass}</p></div><table style="width:100%; border-collapse:collapse; border:1px solid #333;"><thead><tr style="background:#eee"><th>Subject</th>${st.semesterData.map(s => `<th>${s.semName}</th>`).join('')}<th>Avg</th></tr></thead><tbody>`;
        st.subs.forEach((sub, i) => {
            let sum = 0; html += `<tr><td style="text-align:left; padding-left:5px;">${sub}</td>`;
            st.semesterData.forEach(sem => { sum += sem.grades[i].val; html += `<td>${sem.grades[i].val}</td>`; });
            html += `<td style="font-weight:bold;">${(sum/st.sCount).toFixed(1)}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('report-area').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function exportToExcel() { 
        let blob = new Blob([document.getElementById("mainTable").outerHTML], { type: "application/vnd.ms-excel" }); 
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Students_List.xls"; a.click(); 
    }
    function del(id) { if(confirm("Delete?")) { saveState(); students = students.filter(s => s.id !== id); saveAndRender(); } }
    render();
</script>
</body>
</html>
